version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postcare
      POSTGRES_USER: postcare
      POSTGRES_PASSWORD: postcare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postcare -d postcare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postcare:postcare@postgres:5432/postcare
      SYNC_DATABASE_URL: postgresql://postcare:postcare@postgres:5432/postcare

volumes:
  postgres_data:
